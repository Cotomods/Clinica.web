name: Deploy to DonWeb (FTP)

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Inyectar Cadena de Conexión de Producción
      run: |
        cat << 'EOF' > Clinica.Web/appsettings.Production.json
        {
          "ConnectionStrings": {
            "ClinicaDb": "${{ secrets.PROD_DB_CONNECTION }}"
          },
          "Logging": {
            "LogLevel": {
              "Default": "Warning",
              "Microsoft.AspNetCore": "Warning"
            }
          },
          "AllowedHosts": "*"
        }
        EOF

    - name: Restaurar dependencias
      run: dotnet restore Clinica.Web/Clinica.Web.csproj

    - name: Compilar (Publish Self-Contained 32-bits)
      run: dotnet publish Clinica.Web/Clinica.Web.csproj -c Release -r win-x86 --self-contained true -o ./publish

    - name: Configurar web.config para diagnóstico en DonWeb
      run: |
        # Habilitar logs detallados
        sed -i 's/stdoutLogEnabled="false"/stdoutLogEnabled="true"/g' ./publish/web.config
        # Cambiar el modelo de hosting a OutOfProcess
        sed -i 's/hostingModel="inprocess"/hostingModel="OutOfProcess"/g' ./publish/web.config
        # Crear la carpeta de logs
        mkdir -p ./publish/logs
        touch ./publish/logs/empty.txt

    - name: Detener aplicación (app_offline.htm)
      run: |
        echo "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>Actualizando</title></head><body><h1 style=\"text-align:center;margin-top:20%;font-family:sans-serif;\">Actualizando el sistema...</h1><p style=\"text-align:center;font-family:sans-serif;\">Por favor, regrese en unos minutos.</p></body></html>" > app_offline.htm
        curl -T app_offline.htm ftp://${{ secrets.FTP_SERVER }}/public_html/app_offline.htm --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
        sleep 10

    - name: Sincronizar vía FTP a DonWeb
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /public_html/

    - name: Reiniciar aplicación (Eliminar app_offline.htm)
      if: always()
      run: |
        curl -Q "-DELE /public_html/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
